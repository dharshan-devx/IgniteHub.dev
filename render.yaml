services:
  - type: web
    name: ignitehub-backend
    env: python
    rootDir: backend
    # Installs dependencies then runs pending Alembic migrations before the
    # new server version starts serving traffic — ensuring zero-downtime schema
    # changes on every deploy.
    buildCommand: pip install -r requirements.txt && alembic upgrade head
    startCommand: uvicorn app.main:app --host 0.0.0.0 --port $PORT
    healthCheckPath: /api/health
    envVars:
      - key: DATABASE_URL
        sync: false
      - key: GEMINI_API_KEY
        sync: false
      - key: ALLOWED_ORIGINS
        sync: false
      - key: ENVIRONMENT
        value: production
